<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suggestions</title>
</head>
<link rel="stylesheet" href="{{ url_for('static', filename='style3.css') }}">
<body>
     <div class="container">

        <h1>
            ♻ Waste Decomposition Suggestions
        </h1>

        <form method="POST">

            <select name="waste" required>

                <option value="">
                    Select Waste Type
                </option>

                <option value="plastic">
                    Plastic Waste
                </option>

                <option value="food">
                    Food Waste
                </option>

                <option value="paper">
                    Paper Waste
                </option>

                <option value="metal">
                    Metal Waste
                </option>

            </select>

            <br><br>

            <button type="submit">
                Get Suggestions
            </button>

        </form>

        <div class="result">

            <pre>{{ suggestion }}</pre>

        </div>

        <a href="/">

            <button class="back-btn">
                ⬅ Back
            </button>

        </a>

    </div>
    
</body>
</html>
